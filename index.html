<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy AI Listing Generator</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI, sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
padding:35px;
border-radius:14px;
max-width:700px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #e0e0e0;
margin-bottom:15px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#667eea;
}

button{
width:100%;
padding:14px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#5b6fe3;
}

.spinner{
display:none;
margin:25px auto;
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #667eea;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.results{
display:none;
margin-top:25px;
background:#f7f7f7;
padding:20px;
border-radius:10px;
}

.section{
margin-bottom:20px;
}

.copyBtn{
margin-top:8px;
background:#333;
padding:8px;
font-size:14px;
}

.counter{
font-size:12px;
color:#777;
margin-top:4px;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

.tag{
background:#e9ecff;
padding:5px 8px;
border-radius:6px;
font-size:13px;
}

.status{
text-align:center;
margin-top:10px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>✨ Etsy AI Generator</h1>
<p class="subtitle">Generate SEO titles, descriptions & tags</p>

<input id="product" placeholder="Product name (e.g. Handmade Ceramic Mug)">
<input id="audience" placeholder="Target audience (e.g. Coffee lovers)">
<input id="tone" placeholder="Tone or style (e.g. Warm and friendly)">
<input id="keywords" placeholder="Keywords (comma separated)">

<button id="generate">Generate Listing</button>

<div class="spinner" id="spinner"></div>
<div class="status" id="status">Loading AI model...</div>

<div class="results" id="results">

<div class="section">
<h3>SEO Title</h3>
<div id="title"></div>
<div class="counter" id="titleCounter"></div>
<button class="copyBtn" onclick="copyText('title')">Copy Title</button>
</div>

<hr>

<div class="section">
<h3>Description</h3>
<div id="description"></div>
<button class="copyBtn" onclick="copyText('description')">Copy Description</button>
</div>

<hr>

<div class="section">
<h3>Etsy Tags</h3>
<div class="tags" id="tags"></div>
<button class="copyBtn" onclick="copyTags()">Copy Tags</button>
</div>

</div>

</div>

<script type="module">

import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0";

const spinner=document.getElementById("spinner");
const status=document.getElementById("status");
const results=document.getElementById("results");

let generator;

async function loadAI(){

generator = await pipeline(
"text2text-generation",
"Xenova/flan-t5-base"
);

status.innerText="AI Ready";

}

loadAI();

document.getElementById("generate").onclick = async () => {

const product=document.getElementById("product").value;
const audience=document.getElementById("audience").value;
const tone=document.getElementById("tone").value;
const keywords=document.getElementById("keywords").value;

const prompt=`
Create an Etsy listing.

Product: ${product}
Audience: ${audience}
Tone: ${tone}
Keywords: ${keywords}

Return format:

TITLE: <seo title under 140 characters>

DESCRIPTION: <engaging description>

TAGS: <13 comma separated etsy tags>
`;

spinner.style.display="block";

const output = await generator(prompt,{max_new_tokens:180});

spinner.style.display="none";

const text=output[0].generated_text;

const title = (text.match(/TITLE:(.*)/i)||["",""])[1].trim();
const description = (text.match(/DESCRIPTION:([\s\S]*?)TAGS:/i)||["",""])[1].trim();
const tagsText = (text.match(/TAGS:(.*)/i)||["",""])[1].trim();

document.getElementById("title").innerText=title;
document.getElementById("description").innerText=description;

document.getElementById("titleCounter").innerText =
title.length + " / 140 characters";

const tagContainer=document.getElementById("tags");
tagContainer.innerHTML="";

const tagList = tagsText.split(",").slice(0,13);

tagList.forEach(tag=>{
const el=document.createElement("div");
el.className="tag";
el.innerText=tag.trim();
tagContainer.appendChild(el);
});

results.style.display="block";

};

window.copyText = function(id){

const text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);

}

window.copyTags = function(){

const tags=[...document.querySelectorAll(".tag")]
.map(tag=>tag.innerText)
.join(", ");

navigator.clipboard.writeText(tags);

}

</script>

</body>
</html>
