<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Etsy Listing Generator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:35px;
border-radius:12px;
max-width:700px;
width:100%;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#666;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #eee;
margin-bottom:15px;
font-size:15px;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

button:hover{
background:#5a6de0;
}

.output{
margin-top:25px;
background:#f7f7f7;
padding:20px;
border-radius:8px;
}

.copyBtn{
margin-top:8px;
background:#333;
}

.counter{
font-size:12px;
color:#777;
margin-top:4px;
}

.spinner{
display:none;
margin:auto;
margin-top:20px;
border:5px solid #eee;
border-top:5px solid #667eea;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="container">

<h1>✨ Etsy AI Listing Generator</h1>
<p class="subtitle">Generate titles, descriptions & tags instantly</p>

<input id="product" placeholder="Product name">
<input id="audience" placeholder="Target audience">
<input id="style" placeholder="Style or tone">
<input id="keywords" placeholder="Keywords (comma separated)">

<button id="generate">Generate Listing</button>

<div class="spinner" id="spinner"></div>

<div class="output" id="output" style="display:none">

<h3>SEO Title</h3>
<div id="title"></div>
<div class="counter" id="titleCount"></div>
<button class="copyBtn" onclick="copyText('title')">Copy Title</button>

<hr>

<h3>Description</h3>
<div id="description"></div>
<button class="copyBtn" onclick="copyText('description')">Copy Description</button>

<hr>

<h3>13 Etsy Tags</h3>
<div id="tags"></div>
<button class="copyBtn" onclick="copyText('tags')">Copy Tags</button>

</div>

</div>

<script type="module">

import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0";

const spinner = document.getElementById("spinner");
const output = document.getElementById("output");

let generator;

async function loadModel(){

spinner.style.display="block";

generator = await pipeline(
"text2text-generation",
"Xenova/flan-t5-base"
);

spinner.style.display="none";

}

loadModel();

document.getElementById("generate").onclick = async () => {

const product = document.getElementById("product").value;
const audience = document.getElementById("audience").value;
const style = document.getElementById("style").value;
const keywords = document.getElementById("keywords").value;

const prompt = `
Create an Etsy listing.

Product: ${product}
Audience: ${audience}
Tone: ${style}
Keywords: ${keywords}

Return format:

TITLE:
DESCRIPTION:
TAGS:
`;

spinner.style.display="block";

const result = await generator(prompt,{max_new_tokens:200});

spinner.style.display="none";

const text = result[0].generated_text;

const titleMatch = text.match(/TITLE:(.*)/);
const descMatch = text.match(/DESCRIPTION:([\s\S]*?)TAGS:/);
const tagMatch = text.match(/TAGS:(.*)/);

const title = titleMatch ? titleMatch[1].trim() : "";
const desc = descMatch ? descMatch[1].trim() : "";
const tags = tagMatch ? tagMatch[1].trim() : "";

document.getElementById("title").innerText = title;
document.getElementById("description").innerText = desc;
document.getElementById("tags").innerText = tags;

document.getElementById("titleCount").innerText =
title.length + " / 140 characters";

output.style.display="block";

};

window.copyText = function(id){

const text = document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
