
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Etsy description generator that helps sellers create SEO-optimized product titles, descriptions, and tags.">
    <meta name="keywords" content="Etsy, AI, Generator, Product Description, SEO">
    <meta property="og:title" content="Etsy AI Generator">
    <meta property="og:description" content="Generate unique Etsy product descriptions with AI">
    <title>✨ Etsy AI Product Description Generator ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .spinner {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-top: 15px;
        }

        #result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            input {
                padding: 10px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Etsy AI Product Description Generator ✨</h1>
        <p class="subtitle">Create SEO-optimized product descriptions instantly</p>

        <form id="generatorForm">
            <div>
                <label for="product">Product Name</label>
                <input type="text" id="product" placeholder="e.g., Handmade Ceramic Mug" required>
            </div>

            <div>
                <label for="audience">Target Audience</label>
                <input type="text" id="audience" placeholder="e.g., Coffee lovers, Eco-conscious buyers" required>
            </div>

            <div>
                <label for="style">Style / Tone</label>
                <input type="text" id="style" placeholder="e.g., Warm and friendly, Professional" required>
            </div>

            <div>
                <label for="keywords">Keywords (comma separated)</label>
                <input type="text" id="keywords" placeholder="e.g., ceramic, eco-friendly, handmade" required>
            </div>

            <button type="submit">Generate Description</button>
        </form>

        <div class="spinner" id="spinner"></div>
        <div class="loading-text" id="loadingText">Generating your description... ✨</div>

        <div id="result"></div>

        <footer>
            Made with ❤️ using AI | No credit card required
        </footer>
    </div>

    <script>
        document.getElementById('generatorForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const product = document.getElementById('product').value;
            const audience = document.getElementById('audience').value;
            const style = document.getElementById('style').value;
            const keywords = document.getElementById('keywords').value;

            document.getElementById('spinner').style.display = 'block';
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const prompt = `You are an expert Etsy product description writer. Generate a compelling, SEO-optimized Etsy product description for:\n\nProduct: ${product}\nTarget Audience: ${audience}\nStyle/Tone: ${style}\nKeywords: ${keywords}\n\nCreate a description that is engaging, naturally includes the keywords, and would appeal to the target audience. Make it unique and persuasive.`;

                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1', {
                    headers: { Authorization: 'Bearer hf_kqHzUxYvXxDpLvWvJzPqKtRsWxYzAbCdEfGhIjKlMnOpQrStUvWxYz' },
                    method: 'POST',
                    body: JSON.stringify({ inputs: prompt }),
                });

                const result = await response.json();

                document.getElementById('spinner').style.display = 'none';
                document.getElementById('loadingText').style.display = 'none';

                if (result[0] && result[0].generated_text) {
                    const generated = result[0].generated_text.substring(prompt.length).trim();
                    document.getElementById('result').textContent = generated;
                    document.getElementById('result').style.display = 'block';
                } else {
                    document.getElementById('result').textContent = '❌ Error: Unable to generate description. Please try again.';
                    document.getElementById('result').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('result').textContent = '❌ Error generating description. Please check your connection and try again.';
                document.getElementById('result').style.display = 'block';
                console.error(error);
            }
        });
    </script>
</body>
</html>
